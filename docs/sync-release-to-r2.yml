# Sync Release to Cloudflare R2
#
# Drop this file into .github/workflows/ in the SimpleSight repo.
#
# On every published release, downloads SimpleSightServerInstaller.exe from the
# release assets and uploads it to the arbinq-software R2 bucket. The ArbInq
# worker always serves from that fixed R2 key, so customers automatically get
# the latest version on their next purchase.
#
# Required GitHub secret:
#   CLOUDFLARE_API_TOKEN — same token used for wrangler deployments
#   (Settings → Secrets and variables → Actions → New repository secret)

name: Sync Release to R2

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "SimpleSightServerInstaller.exe" \
            --repo "${{ github.repository }}"

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@3 r2 object put \
            arbinq-software/simplesight/SimpleSightServerInstaller.exe \
            --file=SimpleSightServerInstaller.exe
