name = "arbinq-api"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Secrets — set with: wrangler secret put SECRET_NAME
# GitHub OAuth (Decap CMS):
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# Stripe:
#   STRIPE_SECRET_KEY         — sk_live_... (or sk_test_... for dev)
#   STRIPE_WEBHOOK_SECRET     — whsec_... from Stripe Dashboard → Webhooks
#   SIMPLESIGHT_PRICE_ID      — price_... from Stripe Dashboard → Products
# Fastmail:
#   FASTMAIL_API_TOKEN        — generated at fastmail.com → Settings → Privacy & Security → API tokens
#   FASTMAIL_ACCOUNT_ID       — run: curl -s -H "Authorization: Bearer $TOKEN" https://api.fastmail.com/jmap/session | jq '.primaryAccounts["urn:ietf:params:jmap:mail"]'
#   FASTMAIL_SENT_MAILBOX_ID  — run the JMAP Mailbox/get call described in docs/stripe-plan.md
#   FASTMAIL_FROM_EMAIL       — e.g. sales@arbinquiry.com
# Config:
#   SITE_URL                  — https://arbinquiry.com
#   WORKER_URL                — https://arbinq-api.<account>.workers.dev (or custom domain)

[[d1_databases]]
binding = "DB"
database_name = "arbinq-purchases"
database_id = "349cae48-db45-4cb4-b720-897adc1b4241"

[[r2_buckets]]
binding = "SOFTWARE"
bucket_name = "arbinq-software"
